<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LBAeroFlight.com — Aerospace Innovation Open House</title>
  <meta name="description" content="Aerospace Innovation Open House — Flight Test, Flight Training, Innovation. Saturday 29 Aug 2026, 10:00 AM – 12:00 PM at Double Eagle Airport (KAEG), Albuquerque, New Mexico. Tour two operational L-29 jet aircraft." />
  <link rel="icon" href="favicon.ico" sizes="any" />
  <link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png" />
  <link rel="icon" type="image/png" sizes="16x16" href="favicon-16x16.png" />
  <link rel="apple-touch-icon" href="apple-touch-icon.png" />
  <link rel="preload" href="assets/fonts/oswald-latin.woff2" as="font" type="font/woff2" crossorigin />
  <link rel="preload" href="assets/img/home-flyer.png?v=4" as="image" />
  <link rel="stylesheet" href="css/styles.css?v=83" />
  <style>
    html, body { background: #000; }
    body { margin: 0; position: relative; }
    /* Transparent header overlaying the flyer — matches the other pages */
    .site-header {
      position: absolute; top: 0; left: 0; right: 0; z-index: 20;
      background: transparent;
      animation: lbFadeDown .7s cubic-bezier(.2,.6,.2,1) both;
    }
    /* Subtle top scrim so the nav stays legible over the bright flyer (like the hero pages) */
    .site-header::after {
      content: ""; position: absolute; left: 0; right: 0; top: 0; height: 180px;
      background: linear-gradient(to bottom, rgba(6,7,10,.82) 0%, rgba(6,7,10,.42) 46%, rgba(6,7,10,0) 100%);
      z-index: -1; pointer-events: none;
    }
    .site-header .brand { animation: lbFadeUp .7s both; animation-delay: .12s; }
    .main-nav li { animation: lbFadeUp .6s both; }
    .main-nav li:nth-child(1) { animation-delay: .18s; }
    .main-nav li:nth-child(2) { animation-delay: .24s; }
    .main-nav li:nth-child(3) { animation-delay: .30s; }
    .main-nav li:nth-child(4) { animation-delay: .36s; }
    .main-nav li:nth-child(5) { animation-delay: .42s; }
    .main-nav li:nth-child(6) { animation-delay: .48s; }
    .home-flyer-wrap {
      display: block;
      width: 100%;
      overflow: hidden;            /* contain the subtle zoom */
    }
    .home-flyer {
      display: block;
      width: 100%;
      height: auto;
      object-fit: contain;
      image-rendering: -webkit-optimize-contrast;
      transform-origin: center 38%;
      animation: flyerReveal 1.1s cubic-bezier(.2,.6,.2,1) both;
      animation-delay: .1s;
    }
    @keyframes lbFadeDown { from { opacity: 0; transform: translateY(-14px); } to { opacity: 1; transform: none; } }
    @keyframes flyerReveal {
      from { opacity: 0; transform: translateY(26px) scale(1.045); filter: saturate(.7) brightness(.78); }
      to   { opacity: 1; transform: none; filter: none; }
    }
  </style>
</head>
<body>

  <!-- ---------- HEADER ---------- -->
  <header class="site-header">
    <div class="container header-inner">
      <a href="index.html" class="brand" aria-label="LB AeroFlight dot com — home">
        <svg class="brand-jet" viewBox="0 0 120 22" aria-hidden="true">
          <path d="M2 17 L74 13 L96 3 C100 1 104 2 101 5 L88 14 L116 13 L108 17 L86 17 L96 21 L92 22 L74 18 L2 19 Z"/>
        </svg>
        <span class="brand-mark"><span class="brand-lb">LB</span><span class="brand-aero">AeroFlight</span><span class="brand-dot">.com</span></span>
      </a>

      <nav class="main-nav" aria-label="Primary">
        <ul>
          <li><a href="index.html" class="active">HOME</a></li>
          <li><a href="about.html">ABOUT US</a></li>
          <li><a href="team.html">TEAM</a></li>
          <li><a href="capabilities.html">CAPABILITIES</a></li>
          <li><a href="platform.html">PLATFORM</a></li>
          <li><a href="contact.html">CONTACT</a></li>
        </ul>
      </nav>

      <button class="nav-toggle" aria-label="Toggle menu" aria-expanded="false">
        <span></span><span></span><span></span>
      </button>
    </div>
  </header>

  <!-- ---------- HOME FLYER ---------- -->
  <main class="home-flyer-wrap">
    <img
      class="home-flyer"
      src="assets/img/home-flyer.png?v=4"
      alt="LB AeroFlight — Aerospace Innovation Open House. Flight Test, Flight Training, Innovation. Saturday 29 August 2026, 10:00 AM to 12:00 PM at Double Eagle Airport (KAEG), Albuquerque, New Mexico. Tour two operational L-29 jet aircraft. RSVP info@LBAeroFlight.com, Scott Hurler Weaver 301-437-8728."
    />
  </main>

  <script src="js/main.js"></script>
</body>
</html>
