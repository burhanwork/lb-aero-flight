  <link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png" />
  <link rel="icon" type="image/png" sizes="16x16" href="favicon-16x16.png" />

  <link rel="preload" as="image"
    href="assets/img/home-flyer-2896.jpg?v=6"
    imagesrcset="assets/img/home-flyer-1448.jpg?v=6 1448w, assets/img/home-flyer-2896.jpg?v=6 2896w, assets/img/home-flyer-3840.jpg?v=6 3840w"
    imagesizes="100vw" />
  <link rel="stylesheet" href="css/styles.css?v=91" />
  <style>
    html, body { background: #000; }
    body { margin: 0; position: relative; }
    /* Transparent header overlaying the flyer — static, like the other pages */
    .site-header {
      position: absolute; top: 0; left: 0; right: 0; z-index: 20;
      background: transparent;
    }
    /* Subtle top scrim so the nav stays legible over the bright flyer (like the hero pages) */
    .site-header::after {
      content: ""; position: absolute; left: 0; right: 0; top: 0; height: 180px;
      background: linear-gradient(to bottom, rgba(6,7,10,.82) 0%, rgba(6,7,10,.42) 46%, rgba(6,7,10,0) 100%);
      z-index: -1; pointer-events: none;
    }
    /* Header text fades up on load — same transition the other pages use (lbFadeUp) */
    .header-inner { animation: lbFadeUp .8s cubic-bezier(.2,.6,.2,1) both; animation-delay: .15s; }
    .home-flyer-wrap {
      display: block;
      width: 100%;
      overflow: hidden;            /* contain the subtle zoom */
      opacity: 0;                  /* revealed once the image has loaded */
    }
    /* Same entrance the Capabilities/Platform hero images use */
    .home-flyer-wrap.is-loaded {
      animation: lbFadeUp .9s cubic-bezier(.2,.6,.2,1) both;
      animation-delay: .05s;
    }
    .home-flyer-tilt { display: block; width: 100%; }
    /* Positioning context for the clickable hotspots; stays at 1:1 for crisp pixels */
    .home-flyer-stage {
      position: relative; display: block; width: 100%;
      transform-origin: center 46%;
    }
    .home-flyer {
      display: block;
      width: 100%;
      height: auto;
    }
    /* Clickable hotspots over the flyer (email, phone, map, site).
       Hover = soft, borderless bloom (no hard box) + a subtle lift,
       matching the polished hover transitions on the other pages. */
    .flyer-hot {
      position: absolute; display: block; z-index: 2;
      cursor: pointer;
      border-radius: 10px;
      background: radial-gradient(ellipse at center, rgba(255,236,205,0) 0%, rgba(255,236,205,0) 70%);
      transition: background .35s ease, transform .35s cubic-bezier(.2,.6,.2,1);
      transform: translateZ(0);
    }
    .flyer-hot:hover {
      background: radial-gradient(ellipse at center, rgba(255,236,205,.16) 0%, rgba(255,236,205,0) 70%);
      transform: scale(1.02);
    }
    /* Keyboard-only focus ring (does not show on mouse hover) */
    .flyer-hot:focus-visible {
      outline: 2px solid rgba(255,255,255,.6); outline-offset: -2px; border-radius: 6px;
    }
    @media (prefers-reduced-motion: reduce) {
      .home-flyer-wrap { opacity: 1; animation: none; }
      .home-flyer-wrap.is-loaded .home-flyer { animation: none; }
    }
    /* ----- Mobile: enlarge the flyer so the print text is legible -----
       The flyer is a 4:3 landscape poster, so a readable size is wider than
       a phone screen. We enlarge it and let the poster panel pan sideways
       (swipe) while the page itself still scrolls vertically as normal.
       Pinch-to-zoom also stays available. Hotspots use % positions, so they
       stay aligned to the artwork at any size. */
    @media (max-width: 760px) {
      .home-flyer-wrap {
        overflow-x: auto;
        overflow-y: hidden;
        -webkit-overflow-scrolling: touch;
        scroll-snap-type: x proximity;
      }
      .home-flyer-tilt { width: max-content; }
      .home-flyer-stage { width: clamp(580px, 210vw, 920px); }
      .home-flyer { width: 100%; }
    }
    @media (max-width: 420px) {
      .home-flyer-stage { width: clamp(620px, 230vw, 920px); }
    }
  </style>
</head>
<body>

  <!-- ---------- HEADER ---------- -->
  <header class="site-header">
    <div class="container header-inner">
      <a href="index.html" class="brand" aria-label="LB AeroFlight dot com — home">
        <svg class="brand-jet" viewBox="0 0 120 22" aria-hidden="true">
          <path d="M2 17 L74 13 L96 3 C100 1 104 2 101 5 L88 14 L116 13 L108 17 L86 17 L96 21 L92 22 L74 18 L2 19 Z"/>
        </svg>
        <span class="brand-mark"><span class="brand-lb">LB</span><span class="brand-aero">AeroFlight</span><span class="brand-dot">.com</span></span>
      </a>

      <nav class="main-nav" aria-label="Primary">
        <ul>
          <li><a href="index.html" class="active">HOME</a></li>
          <li><a href="about.html">ABOUT US</a></li>
          <li><a href="team.html">TEAM</a></li>
          <li><a href="capabilities.html">CAPABILITIES</a></li>
          <li><a href="platform.html">PLATFORM</a></li>
          <li><a href="contact.html">CONTACT</a></li>
        </ul>
      </nav>

      <button class="nav-toggle" aria-label="Toggle menu" aria-expanded="false">
        <span></span><span></span><span></span>
      </button>
    </div>
  </header>

  <!-- ---------- HOME FLYER ---------- -->
  <main class="home-flyer-wrap">
    <div class="home-flyer-tilt">
      <div class="home-flyer-stage">
        <img
          class="home-flyer"
          src="assets/img/home-flyer-2896.jpg?v=6"
          srcset="assets/img/home-flyer-1448.jpg?v=6 1448w,
                  assets/img/home-flyer-2896.jpg?v=6 2896w,
                  assets/img/home-flyer-3840.jpg?v=6 3840w"
          sizes="100vw"
          alt="LB AeroFlight — Aerospace Innovation Open House. Flight Test, Flight Training, Innovation. Saturday 29 August 2026, 10:00 AM to 12:00 PM at Double Eagle Airport (KAEG), Albuquerque, New Mexico. Tour two operational L-29 jet aircraft. RSVP info@LBAeroFlight.com, Scott Hurler Weaver 301-437-8728."
        />

        <!-- Clickable hotspots over the flyer artwork -->
        <a class="flyer-hot" style="left:39%;top:63%;width:35%;height:17%;"
           href="https://www.google.com/maps/search/?api=1&amp;query=Double+Eagle+II+Airport+KAEG+Albuquerque+New+Mexico"
           target="_blank" rel="noopener"
           aria-label="Open event location in Google Maps — Double Eagle Airport (KAEG), Albuquerque, New Mexico"></a>

        <a class="flyer-hot" style="left:3%;top:81%;width:37%;height:13%;"
           href="mailto:info@LBAeroFlight.com"
           aria-label="Email info@LBAeroFlight.com"></a>

        <a class="flyer-hot" style="left:40%;top:81%;width:33%;height:13%;"
           href="tel:+13014378728"
           aria-label="Call Scott Hurler Weaver at 301-437-8728"></a>

        <a class="flyer-hot" style="left:73%;top:81%;width:26%;height:13%;"
           href="index.html"
           aria-label="LBAeroFlight.com home"></a>
      </div>
    </div>
  </main>

  <script src="js/main.js"></script>
  <script>
    /* Play the reveal once the flyer image is actually painted (it's large),
       so the entrance animation is always seen. Fallbacks keep it visible. */
    (function () {
      var wrap = document.querySelector('.home-flyer-wrap');
      var img = document.querySelector('.home-flyer');
      if (!wrap) return;
      function reveal() { wrap.classList.add('is-loaded'); }
      if (img && img.complete && img.naturalWidth) { reveal(); }
      else if (img) { img.addEventListener('load', reveal); img.addEventListener('error', reveal); }
      setTimeout(reveal, 3000); /* safety: never leave the page hidden */
    })();
  </script>
</body>
</html>
